server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: item-service
          uri: http://item-service:8081  # Service name, not localhost
          predicates:
            - Path=/items/**
        - id: order-service
          uri: http://order-service:8082  # Service name, not localhost
          predicates:
            - Path=/orders/**
        - id: payment-service
          uri: http://payment-service:8083  # Service name, not localhost
          predicates:
            - Path=/payments/**

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.web: INFO