version: '3.8'

services:
  item-service:
    build: ./item-service
    container_name: item-service
    ports:
      - "8081:8081"
    networks:
      - microservices-net
    environment:
      - SERVER_PORT=8081
      - SPRING_APPLICATION_NAME=item-service

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    networks:
      - microservices-net
    environment:
      - SERVER_PORT=8082
      - SPRING_APPLICATION_NAME=order-service

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8083:8083"
    networks:
      - microservices-net
    environment:
      - SERVER_PORT=8083
      - SPRING_APPLICATION_NAME=payment-service

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - item-service
      - order-service
      - payment-service
    networks:
      - microservices-net
    environment:
      - SERVER_PORT=8080
      - SPRING_APPLICATION_NAME=api-gateway

networks:
  microservices-net:
    driver: bridge